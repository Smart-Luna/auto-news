name: 每日新闻推送

on:
  schedule:
    - cron: '0 1 * * *'  # 每天早上 9 点运行

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 运行 Python 脚本
        run: |
          echo "自动化任务开始"
          echo "每天定时推送工作通知"
          
      - name: 发送邮件
        uses: peter-evans/sendgrid-action@v2
        with:
          sendgrid-api-key: ${{ secrets.SENDGRID_API_KEY }}
          to: 3305471828@qq.com
          from: noreply@github.com
          subject: 今日动态
          body: |
            这是您的每日工作通知。
